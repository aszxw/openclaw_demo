<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深度研究</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 2rem;
      font-weight: 300;
      font-size: 2rem;
      letter-spacing: 0.1em;
    }

    .input-box {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    input {
      flex: 1;
      padding: 1rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      outline: none;
      transition: all 0.3s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input:focus {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
    }

    button {
      padding: 1rem 2rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: #fff;
      font-weight: 500;
      transition: all 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 0.75rem;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4facfe;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .result {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 2rem;
      color: #fff;
      line-height: 1.8;
    }

    .result h1, .result h2, .result h3 {
      color: #4facfe;
      margin: 1.5rem 0 1rem;
    }

    .result h1:first-child, .result h2:first-child, .result h3:first-child {
      margin-top: 0;
    }

    .result p {
      margin-bottom: 1rem;
    }

    .result ul, .result ol {
      margin: 1rem 0;
      padding-left: 1.5rem;
    }

    .result li {
      margin-bottom: 0.5rem;
    }

    .result code {
      background: rgba(79, 172, 254, 0.2);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 0.9em;
    }

    .result pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .result pre code {
      background: none;
      padding: 0;
    }

    .result a {
      color: #4facfe;
      text-decoration: none;
    }

    .result a:hover {
      text-decoration: underline;
    }

    .result blockquote {
      border-left: 4px solid #4facfe;
      padding-left: 1rem;
      margin: 1rem 0;
      color: rgba(255, 255, 255, 0.7);
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 深度研究</h1>
    
    <div class="input-box">
      <input type="text" id="topic" placeholder="输入研究主题..." />
      <button id="startBtn">开始研究</button>
    </div>

    <div id="status" class="status hidden">
      <div class="status-item">
        <span class="dot"></span>
        <span id="statusText">正在初始化...</span>
      </div>
    </div>

    <div id="result" class="result hidden"></div>
  </div>

  <script>
    const topicInput = document.getElementById('topic');
    const startBtn = document.getElementById('startBtn');
    const statusDiv = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const resultDiv = document.getElementById('result');

    const sessionId = 'c7e4a94c-7ee4-416b-9c07-5139ed3b49b6';
    const apiUrl = 'https://hragent-Performance-test-cn.t-sy-in.earth.xcloud.lenovo.com/deepresearch/stream_test';

    startBtn.addEventListener('click', startResearch);
    topicInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') startResearch();
    });

    function startResearch() {
      const topic = topicInput.value.trim();
      if (!topic) {
        topicInput.focus();
        return;
      }

      startBtn.disabled = true;
      statusDiv.classList.remove('hidden');
      resultDiv.classList.add('hidden');
      resultDiv.innerHTML = '';
      statusText.textContent = '正在连接...';

      fetch(apiUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          sessionId: sessionId,
          messages: [{ content: topic }]
        })
      }).then(response => {
        if (!response.ok) throw new Error('请求失败');
        return response.body.getReader();
      }).then(reader => {
        const decoder = new TextDecoder();
        let buffer = '';

        function read() {
          reader.read().then(({ done, value }) => {
            if (done) {
              statusText.textContent = '研究完成';
              setTimeout(() => {
                statusDiv.classList.add('hidden');
                startBtn.disabled = false;
              }, 1000);
              return;
            }

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                try {
                  const data = JSON.parse(line.slice(6));
                  handleMessage(data);
                } catch (e) {
                  console.error('解析失败:', e);
                }
              }
            }

            read();
          });
        }

        read();
      }).catch(err => {
        let msg = err.message;
        if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
          msg = '网络请求失败，可能是跨域问题。建议：1) 在本地开发环境运行；2) 联系后端添加 CORS 头部';
        }
        statusText.textContent = '错误: ' + msg;
        startBtn.disabled = false;
      });
    }

    function handleMessage(data) {
      if (data.type === 'tool') {
        statusText.textContent = data.content || '研究中...';
      } else if (data.type === 'markdown') {
        resultDiv.classList.remove('hidden');
        resultDiv.innerHTML += marked.parse(data.content);
      }
    }
  </script>
</body>
</html>
